<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Zen Charge by Alahari Enterprises designs and manages reliable EV charging infrastructure, charging station installation, and end-to-end operations.">
  <meta name="theme-color" content="#0E6B57">
  <meta property="og:title" content="Zen Charge | EV Charging Infrastructure">
  <meta property="og:description" content="Reliable EV charger installation, charging station management, and end-to-end infrastructure by Alahari Enterprises.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="zen-charge-logo.jpeg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Zen Charge | EV Charging Infrastructure">
  <meta name="twitter:description" content="Reliable EV charger installation, charging station management, and end-to-end infrastructure by Alahari Enterprises.">
  <meta name="twitter:image" content="zen-charge-logo.jpeg">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Zen Charge">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="icons/zen-charge-icon.svg"/>
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Zen Charge | EV Charging Infrastructure</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // The value below is injected by flutter build, do not touch.
    var serviceWorkerVersion = null;
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>
<body>
  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        }
      }).then(function(engineInitializer) {
        return engineInitializer.initializeEngine();
      }).then(function(appRunner) {
        return appRunner.runApp();
      });
    });
  </script>
</body>
</html>
